paths:
  project_root: "{project_root}"
  dataset_root: "/home/vali/Desktop/Disc-1TB/ULP-SE-aTENNuate/dataset"
  output_root: "{project_root}/outputs/combined_datasets"
  tracking_root: "{project_root}/tracking/combined_datasets"
  reference_root: "{project_root}/reference"
  teacher_source_checkpoint: "{project_root}/reference/checkpoints/metricgan_plus_native8k_small.pt"

tracking:
  experiment_name: "metricgan_combined_datasets"

dataset:
  dataset_type: "academic_combined"
  voicebank_root: "{dataset_root}/voicebank-demand"
  dns5_root: "{dataset_root}/dns5-headset-16k"
  voicebank_campaign_dir: "{dataset_root}/voicebank-demand/16k/campaign"
  dns5_train_csv: "{dataset_root}/dns5-headset-16k/train.csv"
  dns5_val_csv: "{dataset_root}/dns5-headset-16k/val.csv"
  # Optional: set dns5_test_csv to an official DNS5 test/dev manifest when available.
  dns5_test_csv: ""
  # If dns5_test_csv is missing, reserve a deterministic 10% split from DNS5 train as test.
  dns5_test_from_train_fraction: 0.10
  split_seed: 42
  dns5_rank_count: 4096
  combined_train_csv: "{output_root}/combined/train_combined.csv"
  combined_val_rank_csv: "{output_root}/combined/val_rank_combined.csv"
  combined_val_select_csv: "{output_root}/combined/val_select_combined.csv"
  combined_test_csv: "{output_root}/combined/test_combined.csv"

  # Training/eval manifests consumed by training pipeline.
  train_fit_csv: "{output_root}/combined/train_combined.csv"
  val_rank_csv: "{output_root}/combined/val_rank_combined.csv"
  val_select_csv: "{output_root}/combined/val_select_combined.csv"
  test_csv: "{output_root}/combined/test_combined.csv"
  val_speakers: ["p239", "p286", "p244", "p270"]
  rank_count: 128

teacher_cache:
  out_dir: "{output_root}/teacher_cache"
  manifest: "{output_root}/teacher_cache/teacher_cache.csv"

training:
  sample_rate: 16000
  n_fft: 512
  hop_length: 160
  win_length: 320
  segment_len: 32000
  erb_bands: 32
  context_frames: 5
  guidance_classic: "none"
  scheduler: "plateau"
  lr_factor: 0.5
  lr_patience: 3
  min_lr: 0.000001
  eval_every: 2
  grad_clip: 5.0
  amp: true
  sample_count: 3
  benchmark_seconds: 10
  benchmark_repeats: 3

stage1:
  families: ["metricgan_plus_native8k_causal_s"]
  seeds: [0]
  loss_recipe: "D1"
  lr: 0.0005
  epochs: 100
  early_stop_patience: 8
  min_epochs: 15

qat:
  loss_recipe: "D2"
  lr: 0.0002
  epochs: 20
  early_stop_patience: 4
  min_epochs: 10

evaluation:
  eval_batch_size: 16
  compute_composite: false

mcu:
  profile: "imx_rt700_ai_audio_rt"

teacher_training:
  families: ["metricgan_plus_native8k"]
  variants: ["small"]
  seeds: [0]
  loss_recipe: "T0"
  lr: 0.001
  epochs: 50
  early_stop_patience: 10
  min_epochs: 20

reference:
  teacher_run_name: "metricgan_plus_native8k-small-teacher-training-seed0"
  stage1_run_names:
    - "metricgan_plus_native8k_causal_s-small-lr0.0005-seg32000-lossD1-seed0"
  final_qat_run_name: "metricgan_plus_native8k_causal_s-small-lr0.0002-seg32000-lossD2-seed0"
