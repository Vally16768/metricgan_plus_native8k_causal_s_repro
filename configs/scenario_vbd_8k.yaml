paths:
  output_root: "{project_root}/outputs/vbd8k"
  tracking_root: "{project_root}/tracking/vbd8k"
  dataset_root: "/home/vali/Desktop/Disc-1TB/ULP-SE-aTENNuate/dataset/voicebank-demand"
  project_root: "{project_root}"

tracking:
  experiment_name: "metricgan_vbd8k"

dataset:
  dataset_type: "voicebank"
  train_csv_16k: "{dataset_root}/8k/campaign/train_fit.csv"
  test_csv_16k: "{dataset_root}/8k/test.csv"
  campaign_dir_8k: "{dataset_root}/8k/campaign"
  train_fit_csv: "{dataset_root}/8k/campaign/train_fit.csv"
  val_rank_csv: "{dataset_root}/8k/campaign/val_rank.csv"
  val_select_csv: "{dataset_root}/8k/campaign/val_select.csv"
  test_csv: "{dataset_root}/8k/test.csv"
  val_speakers: ["p239", "p286", "p244", "p270"]
  rank_count: 128

training:
  sample_rate: 8000
  n_fft: 256
  hop_length: 80
  win_length: 160
  segment_len: 16000
