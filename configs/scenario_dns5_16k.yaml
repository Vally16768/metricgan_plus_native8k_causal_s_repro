  seeds: [0, 1]
  loss_recipe: "D1"
  lr: 0.0005
  epochs: 100
  early_stop_patience: 8
  min_epochs: 15

qat:
  loss_recipe: "D2"
  lr: 0.0002
  epochs: 20
  early_stop_patience: 4
  min_epochs: 10
